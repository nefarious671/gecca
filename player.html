<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL-NET // V5</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { --accent: #00ff9d; --bg: #0a0a0a; }
        body { background: var(--bg); color: #888; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { color: var(--accent); font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input { background: #111; border: 1px solid #333; color: var(--accent); padding: 10px; width: 70%; outline: none; }
        button { background: var(--accent); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #gallery { margin-top: 30px; display: grid; gap: 15px; }
        .card { border: 1px solid #222; padding: 15px; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); background: #111; }
        .card strong { color: #eee; display: block; margin-bottom: 5px; }
        .status { color: var(--accent); font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">SYSTEM_STATUS: ONLINE // BYPASS_READY</div>
    
    <input type="text" id="searchBox" placeholder="ENTER_TITLE..." onkeydown="if(event.key==='Enter') doSearch()">
    <button onclick="doSearch()">EXECUTE</button>

    <div id="gallery">
        <div class="status">Waiting for input...</div>
    </div>
</div>

<script>
    // No puter.init() needed here. The SDK handles it.

    async function doSearch() {
        const query = document.getElementById('searchBox').value;
        if (!query) return;
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = `<div class="status">QUERYING_DB: ${query.toUpperCase()}...</div>`;

        try {
            const url = `https://v2.sg.media-imdb.com/suggestion/${query[0].toLowerCase()}/${encodeURIComponent(query)}.json`;
            
            // Direct fetch via Puter network bypass
            const response = await puter.net.fetch(url);
            const data = await response.json();
            
            gallery.innerHTML = "";
            if (!data.d) {
                gallery.innerHTML = `<div class="status">NO_RESULTS_FOUND</div>`;
                return;
            }

            data.d.forEach(item => {
                if (!item.id || !item.id.startsWith('tt')) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <strong>${item.l} (${item.y || '????'})</strong>
                    <span>TYPE: ${item.q || 'N/A'} // IMDB_ID: ${item.id}</span>
                `;
                card.onclick = () => launchPlayer(item.id, item.q);
                gallery.appendChild(card);
            });
        } catch (e) {
            console.error(e);
            gallery.innerHTML = `<div class="status" style="color:red">ERROR_INITIALIZING_PUTER_NETWORK</div>`;
        }
    }

    function launchPlayer(id, type) {
        // Handle logic for movies vs TV endpoints
        const isTV = (type && type.toLowerCase().includes('tv'));
        const endpoint = isTV ? 'tv' : 'movie';
        
        // Final destination URL (using the vidsrc.net source you verified)
        const target = `https://vidsrc.net/embed/${endpoint}/${id}`;
        
        // Open in new window to bypass all iframe/sandbox malarky
        window.open(target, '_blank', 'noopener,noreferrer');
    }
</script>

</body>
</html>
