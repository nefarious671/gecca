<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL-NET // V7 // ENGINE_EXTRACTOR</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { --accent: #00ff9d; --bg: #0a0a0a; }
        body { background: var(--bg); color: #888; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { color: var(--accent); font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .controls { display: flex; flex-wrap: wrap; gap: 10px; background: #111; padding: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .control-group { display: flex; align-items: center; gap: 5px; }
        
        input { background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; outline: none; font-family: monospace; }
        input[type="number"] { width: 50px; }
        .search-main { width: 100%; margin-bottom: 10px; display: flex; gap: 10px; }
        .search-main input { flex-grow: 1; }
        
        button { background: var(--accent); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; color: #000; }
        button:hover { filter: brightness(1.2); }

        #gallery { margin-top: 10px; display: grid; gap: 10px; }
        .card { border: 1px solid #222; padding: 15px; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); background: #161616; }
        .card strong { color: #eee; display: block; margin-bottom: 5px; }
        .status { color: var(--accent); font-size: 0.8em; margin-top: 10px; }
        label { font-size: 0.7em; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">SYSTEM_STATUS: ONLINE // EXTRACTION_MODE_ACTIVE</div>
    
    <div class="controls">
        <div class="search-main">
            <input type="text" id="searchBox" placeholder="TARGET_TITLE..." onkeydown="if(event.key==='Enter') doSearch()">
            <button onclick="doSearch()">EXECUTE</button>
        </div>
        <div class="control-group">
            <label>LANG:</label><input type="text" id="lang" value="en" style="width: 30px;">
            <label>S:</label><input type="number" id="season" value="1" min="1">
            <label>E:</label><input type="number" id="episode" value="1" min="1">
        </div>
    </div>

    <div id="gallery">
        <div class="status">Waiting for mission parameters...</div>
    </div>
</div>

<script>
    async function doSearch() {
        const query = document.getElementById('searchBox').value;
        if (!query) return;
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = `<div class="status">SCANNING_IMDB: ${query.toUpperCase()}...</div>`;

        try {
            const url = `https://v2.sg.media-imdb.com/suggestion/${query[0].toLowerCase()}/${encodeURIComponent(query)}.json`;
            const response = await puter.net.fetch(url);
            const data = await response.json();
            
            gallery.innerHTML = "";
            data.d.forEach(item => {
                if (!item.id?.startsWith('tt')) return;
                const card = document.createElement('div');
                card.className = 'card';
                const type = item.q || 'feature';
                card.innerHTML = `
                    <strong>${item.l} (${item.y || '????'})</strong>
                    <span style="font-size: 0.7em; color: var(--accent); border: 1px solid; padding: 2px;">${type.toUpperCase()}</span>
                `;
                card.onclick = () => extractAndLaunch(item.id, type);
                gallery.appendChild(card);
            });
        } catch (e) { gallery.innerHTML = `<div class="status" style="color:red">CONNECTION_ERROR</div>`; }
    }

    async function extractAndLaunch(id, type) {
        const status = document.querySelector('.status') || document.createElement('div');
        status.innerText = "[ INITIALIZING_EXTRACTION... ]";
        
        const lang = document.getElementById('lang').value || 'en';
        const s = document.getElementById('season').value || 1;
        const e = document.getElementById('episode').value || 1;
        const isTV = type.toLowerCase().includes('tv');
        
        // 1. Construct the Wrapper URL (The "Whack-a-Mole" front-end)
        const wrapperUrl = isTV 
            ? `https://vidsrc-embed.ru/embed/tv?imdb=${id}&season=${s}&episode=${e}&ds_lang=${lang}`
            : `https://vidsrc-embed.ru/embed/movie?imdb=${id}&ds_lang=${lang}`;

        try {
            // 2. Use Puter to fetch the HTML of the wrapper page secretly
            const response = await puter.net.fetch(wrapperUrl);
            const html = await response.text();

            // 3. Use Regex to find the real Cloudnestra player URL hidden in the iframe src
            // We look for: src="//cloudnestra.com/rcp/[HASH]"
            const engineMatch = html.match(/src="([^"]*cloudnestra\.com\/rcp\/[^"]+)"/);

            if (engineMatch && engineMatch[1]) {
                let engineUrl = engineMatch[1];
                if (engineUrl.startsWith('//')) engineUrl = 'https:' + engineUrl;
                
                console.log("ENGINE_EXTRACTED:", engineUrl);
                // 4. Open ONLY the engine. No ads, no sbx.js, no loops.
                window.open(engineUrl, '_blank', 'noopener,noreferrer');
            } else {
                // Fallback if extraction fails: open the wrapper
                window.open(wrapperUrl, '_blank', 'noopener,noreferrer');
            }
        } catch (err) {
            console.error("Extraction failed, falling back.", err);
            window.open(wrapperUrl, '_blank');
        }
    }
</script>
</body>
</html>
